  #loader.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #0f172a; border-radius: 50%; animation: spin 0.8s linear infinite; }

  #err-msg { display: none; position: fixed; inset: 0; padding: 32px; background: #fef2f2; color: #991b1b; font-family: monospace; white-space: pre-wrap; overflow: auto; z-index: 1001; }

<div id="loader"><div class="spinner"></div></div>
<div id="root"></div>
<div id="err-msg"></div>

<script>
// 에러 캡처: 화면에 표시
window.addEventListener('error', function(e) {
  var el = document.getElementById('err-msg');
  if (el) {
    el.style.display = 'block';
    el.textContent = '오류가 발생했습니다:\n\n' + (e.message || 'Unknown') + '\n\n파일: ' + (e.filename || '') + ' (' + (e.lineno || '?') + ':' + (e.colno || '?') + ')\n\n' + (e.error && e.error.stack ? e.error.stack : '');
  }
});

// localStorage 어댑터 (window.storage 시뮬레이션)
var STORAGE_PREFIX = 'dashboard_';
window.storage = {
  get: function(key) {
    try {
      var value = localStorage.getItem(STORAGE_PREFIX + key);
      return Promise.resolve(value === null ? null : { key: key, value: value, shared: false });
    } catch (e) { return Promise.resolve(null); }
  },
  set: function(key, value) {
    try {
      localStorage.setItem(STORAGE_PREFIX + key, value);
      return Promise.resolve({ key: key, value: value, shared: false });
    } catch (e) { return Promise.resolve(null); }
  },
  delete: function(key) {
    try {
      localStorage.removeItem(STORAGE_PREFIX + key);
      return Promise.resolve({ key: key, deleted: true });
    } catch (e) { return Promise.resolve(null); }
  }
};
</script>
